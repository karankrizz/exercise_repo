<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div class="title">
    <h1><u>colspan with rowspan</u></h1>
  </div>

  <div class="example">
    <table border="2">
      <thead>
        <tr>
          <th rowspan="2">SESSION</th>
          <th rowspan="2">Food</th>
          <th colspan="2">FOOD price</th>
        </tr>
        <tr>
          <th>Quantity</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <th rowspan="3">MORNING</td>
          <td>idly</td>
          <td>4</td>
          <td>10</td>
        </tr>
        <tr>
          <td>tea</td>
          <td>1</td>
          <td>15</td>
        </tr>
        <tr>
          <td>vadai</td>
          <td>2</td>
          <td>12</td>
        </tr>
      
      </tbody>
        <tfoot>
           <tr>
          <th colspan="3"> TOTAL</th>
          <td> 79 </td>
        </tr>
        </tfoot>
       
    </table>
  </div>
</body>

</html>
