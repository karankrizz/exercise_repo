<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabindex</title>
</head>

<body>
    <div class="title">
        <h1>tabindex</h1>

    </div>
    <div class="example">
        <h1 tabindex="2">kirubha</h1>
        <p tabindex="4">my age is 25</p>
        <p contenteditable="true" tabindex="1"> i am an msc.mathematics graduate.</p>
        <p style="background-color: brown;color: darkgray;" tabindex="3"> i have a hobby of watching movies</p>
    </div>
</body>

</html>
