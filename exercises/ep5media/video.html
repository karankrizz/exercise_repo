<!DOCTYPE html>
<html>

<head>
   
    <title>video</title>
</head>

<body>
    <div class="title">
        <h1> video tag</h1>
    </div>

    <div class="attributes">
        <h1>controls</h1>
        <video width="500" height="300" controls loop>
            <source
                src="/assets/The Title Track Is As Groovy As The Whole Series ｜ SCAM 1992 - The Harshad Mehta Story.mp4"
                type="video/mp4">
        </video>
        <hr>
        <video src="/assets/The Title Track Is As Groovy As The Whole Series ｜ SCAM 1992 - The Harshad Mehta Story.mp4"
            height="250" width="400" controls loop>
            SCAM

        </video>
        <hr>
        <video src="/assets/Spiderman.m4v" height="250" width="400" controls loop>
            SCAM

        </video>
        <hr>
        <h1>autoplay muted</h1>
        <video src="/assets/The Title Track Is As Groovy As The Whole Series ｜ SCAM 1992 - The Harshad Mehta Story.mp4"
            height="250" width="400" controls autoplay muted> SCAM</video>
    </div>
</body>

</html>
